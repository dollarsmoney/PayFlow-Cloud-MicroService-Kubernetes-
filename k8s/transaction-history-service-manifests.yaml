apiVersion: v1
kind: ConfigMap
metadata:
  name: transaction-history-service-config
  namespace: payflow-system
data:
  NODE_ENV: "production"
  PORT: "3006"

  # Kafka — transaction-history is a CONSUMER of events from multiple services.
  # It listens to payment, wallet, and user events to build a complete audit trail.
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_CLIENT_ID: "transaction-history-service"
  KAFKA_GROUP_ID: "transaction-history-group"

  # Topics this service consumes
  KAFKA_TOPICS_CONSUME: "payment.created,payment.completed,payment.failed,wallet.credited,wallet.debited"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-history-service
  namespace: payflow-system
  labels:
    app: transaction-history-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-history-service
  template:
    metadata:
      labels:
        app: transaction-history-service
    spec:
      serviceAccountName: payflow-service-account
      containers:
      - name: transaction-history-service
        image: payflow/transaction-history-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3006
        envFrom:
        - configMapRef:
            name: transaction-history-service-config
        - secretRef:
            # Injects: DATABASE_URL for persisting transaction history records
            name: payflow-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: transaction-history-service
  namespace: payflow-system
spec:
  type: ClusterIP
  selector:
    app: transaction-history-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3006
