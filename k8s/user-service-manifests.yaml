apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: payflow-system
data:
  NODE_ENV: "production"
  PORT: "3002"

  # Kafka — user-service publishes events when users register or update profiles
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_CLIENT_ID: "user-service"
  KAFKA_GROUP_ID: "user-service-group"
  KAFKA_TOPIC_USER_EVENTS: "user.registered"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: payflow-system
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      serviceAccountName: payflow-service-account
      containers:
      - name: user-service
        image: payflow/user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: user-service-config
        - secretRef:
            # Injects: DATABASE_URL, POSTGRES_USER, POSTGRES_PASSWORD, JWT_SECRET
            name: payflow-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: payflow-system
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3002
