apiVersion: v1
kind: ConfigMap
metadata:
  name: fraud-detection-service-config
  namespace: payflow-system
data:
  NODE_ENV: "production"
  PORT: "3005"

  # Kafka — fraud-detection is a CONSUMER only (no DB writes for read-only analysis)
  # It subscribes to payment and auth events to detect anomalies in real-time.
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_CLIENT_ID: "fraud-detection-service"
  KAFKA_GROUP_ID: "fraud-detection-group"

  # Topics this service consumes for anomaly detection
  KAFKA_TOPICS_CONSUME: "payment.created,payment.completed,payment.failed,auth.login.success,wallet.debited"

  # Fraud thresholds (configurable without code changes via ConfigMap)
  FRAUD_MAX_DAILY_TRANSFER_AMOUNT: "50000"   # Alert if daily transfers exceed $50k
  FRAUD_MAX_HOURLY_TRANSACTIONS: "20"         # Alert if >20 transactions per hour

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-service
  namespace: payflow-system
  labels:
    app: fraud-detection-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection-service
  template:
    metadata:
      labels:
        app: fraud-detection-service
    spec:
      serviceAccountName: payflow-service-account
      containers:
      - name: fraud-detection-service
        image: payflow/fraud-detection-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3005
        envFrom:
        - configMapRef:
            name: fraud-detection-service-config
        - secretRef:
            # Injects: JWT_SECRET for validating internal service tokens
            name: payflow-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-service
  namespace: payflow-system
spec:
  type: ClusterIP
  selector:
    app: fraud-detection-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3005
