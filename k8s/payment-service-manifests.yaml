apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: payflow-system
data:
  NODE_ENV: "production"
  PORT: "8080"              # Go service uses 8080

  # Kafka — payment-service is the PRIMARY event producer.
  # It publishes payment lifecycle events consumed by fraud-detection,
  # notification, and transaction-history services.
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_CLIENT_ID: "payment-service"
  KAFKA_GROUP_ID: "payment-service-group"
  KAFKA_TOPIC_PAYMENT_CREATED: "payment.created"
  KAFKA_TOPIC_PAYMENT_COMPLETED: "payment.completed"
  KAFKA_TOPIC_PAYMENT_FAILED: "payment.failed"

  # Wallet service URL — payment-service calls wallet to debit/credit accounts
  WALLET_SERVICE_URL: "http://wallet-service"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payflow-system
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      serviceAccountName: payflow-service-account
      containers:
      - name: payment-service
        image: payflow/payment-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: payment-service-config
        - secretRef:
            # Injects: DATABASE_URL, POSTGRES_USER, POSTGRES_PASSWORD
            # Note: Go apps typically use DATABASE_URL or individual DB vars
            name: payflow-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: payflow-system
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
