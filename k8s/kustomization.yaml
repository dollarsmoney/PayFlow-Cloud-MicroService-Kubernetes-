apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ==============================================================================
# RESOURCE ORDERING
# ==============================================================================
# Kustomize applies resources in the order they appear here. Kubernetes also
# has built-in ordering (Namespace → Secret → ConfigMap → ... → Deployment).
# We order them logically: infrastructure first, then services.
# ==============================================================================
resources:
# -- Infrastructure & Namespace (created first by auth-service-manifests.yaml)
- auth-service-manifests.yaml          # Also creates the Namespace + RBAC prereqs
- rbac-manifests.yaml                  # ServiceAccount + Role + RoleBinding
- gp3-storageclass.yaml                # Default StorageClass for EBS volumes
- secrets-manifests.yaml               # Centralized secrets (DB, JWT, API keys)

# -- Data tier
- postgres-manifests.yaml              # PostgreSQL StatefulSet + Service
- kafka-manifests.yaml                 # Kafka StatefulSet + Services (KRaft mode)

# -- Application services
- api-gateway-manifests.yaml
- fraud-detection-service-manifests.yaml
- frontend-manifests.yaml
- notification-service-manifests.yaml
- payment-service-manifests.yaml
- transaction-history-service-manifests.yaml
- user-service-manifests.yaml
- wallet-service-manifests.yaml

# -- Scaling & Traffic
- hpa-manifests.yaml                   # HorizontalPodAutoscaler for all 9 services
- ingress-manifests.yaml               # NGINX Ingress (path-based routing)

# ==============================================================================
# IMAGE OVERRIDES (managed by GitHub Actions CI/CD)
# ==============================================================================
# The CI/CD pipeline runs `kustomize edit set image` to update these tags
# on every push to main, replacing :latest with the commit SHA.
# ArgoCD then detects the kustomization.yaml change and syncs the new images.
# ==============================================================================
images:
- name: payflow/api-gateway
  newName: 827566277132.dkr.ecr.us-east-1.amazonaws.com/payflow/api-gateway
  newTag: b35c4b5a2afb0c492758a7952416901d2729da87
- name: payflow/auth-service
  newName: 827566277132.dkr.ecr.us-east-1.amazonaws.com/payflow/auth-service
  newTag: b35c4b5a2afb0c492758a7952416901d2729da87
- name: payflow/fraud-detection-service
  newName: 827566277132.dkr.ecr.us-east-1.amazonaws.com/payflow/fraud-detection-service
  newTag: b35c4b5a2afb0c492758a7952416901d2729da87
- name: payflow/frontend
