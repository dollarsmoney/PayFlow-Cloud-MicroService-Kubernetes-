# ==============================================================================
# KUBERNETES MANIFEST FOR APACHE KAFKA (Single-Broker, KRaft Mode)
# ==============================================================================
# Why we use this:
# The PayFlow architecture uses Kafka as an async message bus. Services like
# Payment, Wallet, User, and Auth PUBLISH events to Kafka topics. Downstream
# consumers (Fraud Detection, Notification, Transaction History) SUBSCRIBE to
# those topics and react asynchronously — decoupling services completely.
#
# KRaft Mode (no Zookeeper):
# Since Kafka 3.3+, Kafka can run without Zookeeper using the KRaft consensus
# protocol. This simplifies the setup from 2 StatefulSets to 1.
#
# Services and Topics:
#   Producers: payment-service, wallet-service, user-service, auth-service
#   Consumers: fraud-detection-service, notification-service, transaction-history-service
#
# Common Topics (auto-created):
#   - payment.created   - payment.completed   - payment.failed
#   - wallet.credited   - wallet.debited
#   - user.registered   - auth.login.success
#
# Network:
#   kafka-headless (ClusterIP: None) — pod-to-pod DNS for the StatefulSet
#   kafka             (ClusterIP)    — stable DNS for client services → kafka:9092
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. CONFIGMAP — Kafka broker configuration
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: payflow-system
  labels:
    app: kafka
    app.kubernetes.io/part-of: payflow
data:
  # KRaft mode — this node acts as both broker and controller
  KAFKA_CFG_PROCESS_ROLES: "broker,controller"
  KAFKA_CFG_NODE_ID: "1"

  # Controller quorum — single-node cluster points to itself via headless service DNS
  KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka-0.kafka-headless.payflow-system.svc.cluster.local:9093"

  # Listeners — PLAINTEXT for client traffic, CONTROLLER for Raft consensus
  KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"

  # Advertised address — clients discover Kafka via the stable ClusterIP service
  KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"

  KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
  KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

  # Topic settings — auto-create allows services to produce without pre-creating topics
  KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
  KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"   # Single-broker: only 1 replica possible
  KAFKA_CFG_NUM_PARTITIONS: "3"               # 3 partitions = 3 parallel consumers per topic

  # Retention — keep messages for 7 days, max 1GB per partition
  KAFKA_CFG_LOG_RETENTION_HOURS: "168"
  KAFKA_CFG_LOG_SEGMENT_BYTES: "1073741824"
  KAFKA_CFG_LOG_RETENTION_BYTES: "-1"         # No size-based retention (only time-based)

  # Allow plaintext traffic (no TLS — add TLS in production)
  ALLOW_PLAINTEXT_LISTENER: "yes"

---
# ------------------------------------------------------------------------------
# 2. HEADLESS SERVICE — required by StatefulSet for stable pod DNS
# ------------------------------------------------------------------------------
# Why headless (clusterIP: None):
# A headless service does not get a ClusterIP. Instead, DNS resolves directly
# to pod IPs. This lets Kafka pods find each other via stable DNS:
#   kafka-0.kafka-headless.payflow-system.svc.cluster.local
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: payflow-system
  labels:
    app: kafka
spec:
  type: ClusterIP
  clusterIP: None   # Headless — no VIP, DNS resolves to pod IPs directly
  selector:
    app: kafka
  ports:
  - name: plaintext
    port: 9092
    targetPort: 9092
  - name: controller
    port: 9093
    targetPort: 9093

---
# ------------------------------------------------------------------------------
# 3. CLIENT SERVICE — stable DNS for application services to connect to Kafka
# ------------------------------------------------------------------------------
# Why separate from headless:
# Client services (auth, payment, etc.) connect to "kafka:9092" — a stable
# ClusterIP that load-balances across Kafka brokers.
# In a multi-broker cluster, this service would round-robin across all brokers.
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: payflow-system
  labels:
    app: kafka
spec:
  type: ClusterIP
  selector:
    app: kafka
  ports:
  - name: plaintext
    port: 9092
    targetPort: 9092

---
# ------------------------------------------------------------------------------
# 4. STATEFULSET — the Kafka broker
# ------------------------------------------------------------------------------
# Why StatefulSet (not Deployment):
# Like Postgres, Kafka needs stable network identity and persistent storage.
# kafka-0 always gets the same hostname and connects to the same EBS volume
# even if the pod is recreated on a different node.
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: payflow-system
  labels:
    app: kafka
    app.kubernetes.io/part-of: payflow
spec:
  serviceName: "kafka-headless"   # Must match the headless service name above
  replicas: 1                     # Single broker for learning. Scale to 3+ for production.
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      serviceAccountName: payflow-service-account
      # Ensure Kafka starts AFTER the namespace and secrets are ready
      initContainers:
      - name: init-kafka-dirs
        image: busybox:1.36
        command: ["sh", "-c", "mkdir -p /bitnami/kafka/data && chmod 777 /bitnami/kafka/data"]
        volumeMounts:
        - name: kafka-storage
          mountPath: /bitnami/kafka
      containers:
      - name: kafka
        image: bitnami/kafka:3.7
        ports:
        - containerPort: 9092
          name: plaintext
        - containerPort: 9093
          name: controller
        envFrom:
        - configMapRef:
            name: kafka-config
        env:
        # KRaft cluster ID — must be a stable unique ID. Generate with:
        # docker run --rm bitnami/kafka:3.7 kafka-storage.sh random-uuid
        - name: KAFKA_CFG_CLUSTER_ID
          value: "cGF5Zmxvdy1rYWZrYS1jbHVzdGVy"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 60   # Kafka takes longer to fully initialize
          periodSeconds: 20
          failureThreshold: 3
        volumeMounts:
        - name: kafka-storage
          mountPath: /bitnami/kafka
  # volumeClaimTemplates create a PVC per-pod automatically
  volumeClaimTemplates:
  - metadata:
      name: kafka-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: gp3          # Uses our custom gp3 StorageClass
      resources:
        requests:
          storage: 10Gi
