apiVersion: v1
kind: ConfigMap
metadata:
  name: wallet-service-config
  namespace: payflow-system
data:
  NODE_ENV: "production"
  PORT: "3003"

  # Kafka — wallet-service publishes debit/credit events consumed by
  # fraud-detection, notification, and transaction-history services
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_CLIENT_ID: "wallet-service"
  KAFKA_GROUP_ID: "wallet-service-group"
  KAFKA_TOPIC_WALLET_CREDITED: "wallet.credited"
  KAFKA_TOPIC_WALLET_DEBITED: "wallet.debited"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: payflow-system
  labels:
    app: wallet-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      serviceAccountName: payflow-service-account
      containers:
      - name: wallet-service
        image: payflow/wallet-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: wallet-service-config
        - secretRef:
            # Injects: DATABASE_URL, POSTGRES_USER, POSTGRES_PASSWORD, JWT_SECRET
            name: payflow-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: payflow-system
spec:
  type: ClusterIP
  selector:
    app: wallet-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3003
