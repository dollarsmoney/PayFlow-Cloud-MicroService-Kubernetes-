# ------------------------------------------------------------------------------
# 5. PAYMENT SERVICE (Go) — CPU-intensive, benefits most from horizontal scaling
# ------------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: payflow-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 2
  maxReplicas: 12   # Allow more replicas — Go is highly concurrent
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65    # Lower threshold for payment SLA
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15    # React very fast for payments
    scaleDown:
      stabilizationWindowSeconds: 300

