# ==============================================================================
# KUBERNETES MANIFEST FOR HORIZONTAL POD AUTOSCALERS (HPA)
# ==============================================================================
# Why we use this:
# Fixed replica counts cannot adapt to traffic spikes. HPAs automatically scale
# the number of pod replicas based on observed CPU and memory usage:
#   - Traffic spike → CPU rises → HPA adds replicas → load distributed
#   - Traffic drops → CPU falls → HPA removes replicas → cost reduced
#
# API Version: autoscaling/v2 (available since Kubernetes 1.23)
# Our EKS cluster runs 1.30 so v2 is stable and preferred over v1.
#
# Prerequisites:
#   metrics-server must be installed in the cluster for CPU/memory metrics.
#   Install with: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# Scaling Strategy:
#   minReplicas: 2  → High availability: never go below 2 pods
#   maxReplicas: 10 → Cap to prevent runaway costs
#   CPU target: 70% → Scale up when average pod CPU usage crosses 70%
#   Memory target: 80% → Scale up when average pod memory crosses 80%
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. API GATEWAY — front-door service, needs fastest scale-out
# ------------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: payflow-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # React quickly to traffic spikes
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5min before scaling down (avoid flapping)

---
