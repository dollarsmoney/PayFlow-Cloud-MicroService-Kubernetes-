apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: payflow-system
data:
  PORT: "3000"
  NODE_ENV: "production"

  # API Gateway URL — the frontend calls this for all API requests.
  # In production: use the actual domain e.g. https://api.payflow.example.com
  # In cluster: the NGINX Ingress forwards /api/* to the api-gateway service.
  NEXT_PUBLIC_API_URL: "/api"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: payflow-system
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: payflow-service-account
      containers:
      - name: frontend
        image: payflow/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: frontend-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: payflow-system
spec:
  # CHANGED: LoadBalancer → ClusterIP
  # The NGINX Ingress (ingress-manifests.yaml) routes /* to this service.
  # One external AWS NLB (from ingress-nginx) handles all public traffic —
  # no need for a second one here.
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
