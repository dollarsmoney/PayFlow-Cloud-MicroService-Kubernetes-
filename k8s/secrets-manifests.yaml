# ==============================================================================
# KUBERNETES MANIFEST FOR PAYFLOW CENTRALIZED SECRETS
# ==============================================================================
# Why we use this: Centralizing secrets avoids duplication and ensures all
# services reference the same credentials. If a password rotates, you only
# change it in one place.
#
# IMPORTANT — PRODUCTION WARNING:
# Storing secrets in Git (even with stringData) is NOT recommended for real
# production systems. The values below are for learning/development purposes.
# For production, replace this file with:
#   → AWS Secrets Manager + External Secrets Operator (ExternalSecret CRD)
#   → HashiCorp Vault + Vault Agent Injector
#   → Sealed Secrets (Bitnami) for encrypted Git storage
#
# stringData vs data:
#   - 'stringData' accepts plain text — Kubernetes base64-encodes it internally
#   - 'data' requires values to be pre-encoded in base64
#   - Use stringData in YAML files for readability; Kubernetes handles encoding
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: payflow-secrets
  namespace: payflow-system
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: payflow
type: Opaque
stringData:
  # --------------------------------------------------------------------------
  # Database credentials — MUST match the values in postgres-manifests.yaml
  # --------------------------------------------------------------------------
  POSTGRES_USER: "payflow_user"
  POSTGRES_PASSWORD: "payflow_password"
  POSTGRES_DB: "payflow_db"

  # Full connection string — used by Node.js services (Prisma/pg/TypeORM)
  # Format: postgresql://<user>:<password>@<host>:<port>/<database>
  DATABASE_URL: "postgresql://payflow_user:payflow_password@postgres:5432/payflow_db"

  # --------------------------------------------------------------------------
  # JWT signing key — used by auth-service to sign and verify tokens
  # IMPORTANT: Replace with a cryptographically random 64-byte string in prod
  # Generate: openssl rand -base64 64
  # --------------------------------------------------------------------------
  JWT_SECRET: "payflow-super-secret-jwt-key-replace-with-openssl-rand-in-production"

  # --------------------------------------------------------------------------
  # Internal API keys (for service-to-service auth if needed in future)
  # --------------------------------------------------------------------------
  INTERNAL_API_KEY: "payflow-internal-api-key-replace-in-production"
