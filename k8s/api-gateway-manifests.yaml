apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: payflow-system
data:
  NODE_ENV: "production"
  PORT: "3000"

  # ============================================================
  # Downstream microservice URLs (Kubernetes internal DNS)
  # Format: http://<service-name>.<namespace>.svc.cluster.local
  # Short form works within the same namespace: http://<service-name>
  # ============================================================
  AUTH_SERVICE_URL: "http://auth-service"
  USER_SERVICE_URL: "http://user-service"
  WALLET_SERVICE_URL: "http://wallet-service"
  PAYMENT_SERVICE_URL: "http://payment-service"
  TRANSACTION_HISTORY_SERVICE_URL: "http://transaction-history-service"
  FRAUD_DETECTION_SERVICE_URL: "http://fraud-detection-service"

  # JWT verification — the api-gateway validates tokens before forwarding
  # The actual JWT_SECRET comes from payflow-secrets (see secretRef below)

  # Request timeout for upstream services (milliseconds)
  UPSTREAM_TIMEOUT_MS: "30000"
  PAYMENT_UPSTREAM_TIMEOUT_MS: "60000"   # Payments may take longer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: payflow-system
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: payflow-service-account
      containers:
      - name: api-gateway
        image: payflow/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: api-gateway-config
        - secretRef:
            # Loads JWT_SECRET for token verification
            name: payflow-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: payflow-system
spec:
  # CHANGED: LoadBalancer → ClusterIP
  # The NGINX Ingress controller (ingress-manifests.yaml) handles external
  # traffic and routes /api/* to this service. Using LoadBalancer here would
  # provision a second AWS NLB unnecessarily (extra cost, complex routing).
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
