name: Build and Deploy (GitOps)

on:
  push:
    branches:
      - main

# OIDC requires these permissions
permissions:
  id-token: write 
  contents: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: payflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # TODO: Replace with the ARN from `terraform output github_actions_role_arn`
          role-to-assume: arn:aws:iam::111111111111:role/github-actions-payflow-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Example: Building Auth Service
      - name: Build, tag, and push Auth Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg SERVICE_NAME=auth-service -f Dockerfile.node -t $ECR_REGISTRY/$ECR_REPOSITORY:auth-$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:auth-$IMAGE_TAG
          
          # Pass variables for the next job
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:auth-$IMAGE_TAG" >> $GITHUB_ENV

      # Update the Kubernetes manifest file
      - name: Update Kubernetes Manifest for GitOps
        run: |
          # Use sed to replace the placeholder image with the new ECR image tag
          sed -i "s|image: payflow/auth-service:latest|image: ${{ env.IMAGE }}|g" k8s/auth-service-manifests.yaml

      # Commit the updated manifest back to GitHub so ArgoCD can detect the change and deploy it
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git commit -am "Update image tags for deployment [skip ci]"
          git push
