name: Build and Deploy (GitOps)

on:
  push:
    branches:
      - main

# OIDC requires these permissions
permissions:
  id-token: write 
  contents: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: payflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: Dockerfile.node
            context: .
          - service: auth-service
            dockerfile: Dockerfile.node
            context: .
          - service: fraud-detection-service
            dockerfile: Dockerfile.node
            context: .
          - service: frontend
            dockerfile: Dockerfile.node
            context: .
          - service: notification-service
            dockerfile: Dockerfile.node
            context: .
          - service: transaction-history-service
            dockerfile: Dockerfile.node
            context: .
          - service: user-service
            dockerfile: Dockerfile.node
            context: .
          - service: wallet-service
            dockerfile: Dockerfile.node
            context: .
          - service: payment-service
            dockerfile: apps/payment-service/Dockerfile
            context: apps/payment-service
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::827566277132:role/github-actions-payflow-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          CONTEXT: ${{ matrix.context }}
        run: |
          docker build --build-arg SERVICE_NAME=$SERVICE -f $DOCKERFILE -t $ECR_REGISTRY/payflow/$SERVICE:$IMAGE_TAG $CONTEXT
          docker push $ECR_REGISTRY/payflow/$SERVICE:$IMAGE_TAG

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes Manifests using Kustomize
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: 827566277132.dkr.ecr.us-east-1.amazonaws.com
        run: |
          cd k8s
          
          # Install Kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          
          # Ensure kustomization.yaml exists or fail gracefully
          if [ ! -f "kustomization.yaml" ]; then
            echo "Error: kustomization.yaml not found!"
            exit 1
          fi

          # Update all images to the new SHA
          SERVICES=("api-gateway" "auth-service" "fraud-detection-service" "frontend" "notification-service" "payment-service" "transaction-history-service" "user-service" "wallet-service")
          for SERVICE in "${SERVICES[@]}"; do
            ./kustomize edit set image payflow/$SERVICE=$ECR_REGISTRY/payflow/$SERVICE:$IMAGE_TAG
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git commit -am "Update image tags to ${{ github.sha }} for GitOps [skip ci]" || echo "No changes to commit"
          git push
